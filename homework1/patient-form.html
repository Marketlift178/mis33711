<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration Form</title>
    <link href="style.css" rel="stylesheet">
</head>
<script>
    const today = new Date();
    document.getElementById("todayDate").innerHTML = today.toDateString();
</script>
<body>
    <div id="banner">
        <img src="logo.png" alt="CougarCare Medical Logo" width="120">
        <h1>CougarCare Medical</h1>
        <p>Patient Registration Form</p>
        <p>Today is: <span id="todayDate"></span></p>
    </div>

    <div class="form-section">
    <h2>New Patient Registration</h2>

    <form action="thankyou.html">
        <table>
            <tr>
                <td>First Name:</td>
                <td><input type="text" name="firstName" maxlength="30"></td>
<tr>
    <td>Date of Birth:</td>
    <td><input type="text" name="dob" placeholder="MM/DD/YYYY"></td>

    <td>Social Security:</td>
    <td><input type="password" name="ssn" maxlength="11"></td>
</tr>

<tr>
    <td>Address Line 1:</td>
    <td><input type="text" name="address1" maxlength="30"></td>

    <td>Address Line 2:</td>
    <td><input type="text" name="address2" maxlength="30"></td>
</tr>

<tr>
    <td>City:</td>
    <td><input type="text" name="city" maxlength="30"></td>

    <td>Zip Code:</td>
    <td><input type="text" name="zip" maxlength="10"></td>
</tr>

<tr>
    <td>Email:</td>
    <td><input type="email" name="email" placeholder="name@domain.com"></td>
</tr>
                <td>Middle Initial:</td>
                <td><input type="text" name="middleInitial" maxlength="1"></td>

                <td>Last Name:</td>
                <td><input type="text" name="lastName" maxlength="30"></td>
            </tr>
        </table>
    </form>
</div>

    <div id="footer">
        <p>CougarCare Medical | <a href="mailto:contact@example.com">Contact Us</a></p>
    </div>
</body>
</html>
