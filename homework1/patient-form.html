<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CougarCare Medical - Patient Registration Form</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <!-- Top banner section -->
    <div id="banner">
        <img src="logo.png" alt="CougarCare Medical Logo" width="120">
        <h1>CougarCare Medical</h1>
        <p>Patient Registration Form</p>
        <p>Today is: <span id="todayDate"></span></p>
    </div>

    <!-- Main content section -->
    <div class="form-section">
        <h2>New Patient Registration</h2>
        <p>Please complete the form below to register as a new patient.</p>

        <!-- Patient registration form -->
        <form action="thankyou.html">

            <table>
                <!-- Name section -->
                <tr>
                    <td><label for="firstName">First Name:</label></td>
                    <td><input type="text" id="firstName" name="firstName" maxlength="30" required></td>

                    <td><label for="middleInitial">Middle Initial:</label></td>
                    <td><input type="text" id="middleInitial" name="middleInitial" maxlength="1"></td>

                    <td><label for="lastName">Last Name:</label></td>
                    <td><input type="text" id="lastName" name="lastName" maxlength="30" required></td>
                </tr>

                <!-- DOB and SSN section -->
                <tr>
                    <td><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input type="text" id="dob" name="dob" placeholder="MM/DD/YYYY" required>
                    </td>

                    <td><label for="ssn">Social Security:</label></td>
                    <td>
                        <input type="password" id="ssn" name="ssn" maxlength="11" placeholder="Obscured">
                    </td>
                </tr>

                <!-- Address section -->
                <tr>
                    <td><label for="address1">Address Line 1:</label></td>
                    <td><input type="text" id="address1" name="address1" maxlength="30" required></td>

                    <td><label for="address2">Address Line 2:</label></td>
                    <td><input type="text" id="address2" name="address2" maxlength="30"></td>
                </tr>

                <tr>
                    <td><label for="city">City:</label></td>
                    <td><input type="text" id="city" name="city" maxlength="30" required></td>

                    <td><label for="state">State:</label></td>
                    <td>
                        <select id="state" name="state" required>
                            <option value="">Select State</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="DC">District of Columbia</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="PR">Puerto Rico</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                        </select>
                    </td>

                    <td><label for="zip">Zip Code:</label></td>
                    <td>
                        <input type="text" id="zip" name="zip" maxlength="10" placeholder="12345">
                    </td>
                </tr>

                <!-- Contact section -->
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" placeholder="name@domain.com" required></td>

                    <td><label for="phone">Phone Number:</label></td>
                    <td><input type="tel" id="phone" name="phone" placeholder="123-456-7890"></td>
                </tr>

                <!-- Text area section -->
                <tr>
                    <td><label for="symptoms">Current Symptoms:</label></td>
                    <td colspan="5">
                        <textarea id="symptoms" name="symptoms" rows="3" cols="50" placeholder="Describe your current symptoms"></textarea>
                    </td>
                </tr>

                <!-- Checkbox section -->
                <tr>
                    <td>Medical History:</td>
                    <td colspan="5">
                        <input type="checkbox" id="chickenPox" name="medicalHistory" value="Chicken Pox">
                        <label for="chickenPox">Chicken Pox</label>

                        <input type="checkbox" id="measles" name="medicalHistory" value="Measles">
                        <label for="measles">Measles</label>

                        <input type="checkbox" id="covid" name="medicalHistory" value="Covid-19">
                        <label for="covid">Covid-19</label>

                        <input type="checkbox" id="tetanus" name="medicalHistory" value="Tetanus">
                        <label for="tetanus">Tetanus</label>

                        <input type="checkbox" id="asthma" name="medicalHistory" value="Asthma">
                        <label for="asthma">Asthma</label>
                    </td>
                </tr>

                <!-- Radio button section 1 -->
                <tr>
                    <td>Gender:</td>
                    <td colspan="5">
                        <input type="radio" id="male" name="gender" value="Male">
                        <label for="male">Male</label>

                        <input type="radio" id="female" name="gender" value="Female">
                        <label for="female">Female</label>

                        <input type="radio" id="otherGender" name="gender" value="Other">
                        <label for="otherGender">Other</label>
                    </td>
                </tr>

                <!-- Radio button section 2 -->
                <tr>
                    <td>Vaccinated?</td>
                    <td colspan="5">
                        <input type="radio" id="vaccinatedYes" name="vaccinated" value="Yes">
                        <label for="vaccinatedYes">Yes</label>

                        <input type="radio" id="vaccinatedNo" name="vaccinated" value="No">
                        <label for="vaccinatedNo">No</label>
                    </td>
                </tr>

                <!-- Radio button section 3 -->
                <tr>
                    <td>Do you have insurance?</td>
                    <td colspan="5">
                        <input type="radio" id="insuranceYes" name="insurance" value="Yes">
                        <label for="insuranceYes">Yes</label>

                        <input type="radio" id="insuranceNo" name="insurance" value="No">
                        <label for="insuranceNo">No</label>
                    </td>
                </tr>

                <!-- Slider section -->
                <tr>
                    <td><label for="healthScale">Health Scale:</label></td>
                    <td colspan="5">
                        1
                        <input type="range" id="healthScale" name="healthScale" min="1" max="10" value="5">
                        10
                        <span id="healthValue">5</span>
                    </td>
                </tr>

                <!-- Account section -->
                <tr>
                    <td><label for="userId">Desired User ID:</label></td>
                    <td>
                        <input type="text" id="userId" name="userId" maxlength="20" required>
                    </td>
                </tr>

                <tr>
                    <td><label for="password">Password:</label></td>
                    <td>
                        <input type="password" id="password" name="password" required>
                    </td>

                    <td><label for="confirmPassword">Re-enter Password:</label></td>
                    <td>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </td>
                </tr>

                <!-- Button section -->
                <tr>
                    <td colspan="6" class="button-row">
                        <input type="reset" value="CLEAR AND START OVER">
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </table>
        </form>
    </div>

    <!-- Footer section -->
    <div id="footer">
        <p>CougarCare Medical</p>
        <p>PO Box 18881 | Sugar Land, TX 77496</p>
        <p>
            <a href="mailto:contact@cougarcaremedical.com">Contact Us</a>
        </p>
    </div>

    <!-- Inline JavaScript for dynamic date and slider display -->
    <script>
        const today = new Date();
        document.getElementById("todayDate").innerHTML = today.toDateString();

        const healthScale = document.getElementById("healthScale");
        const healthValue = document.getElementById("healthValue");

        healthScale.addEventListener("input", function () {
            healthValue.innerHTML = healthScale.value;
        });
    </script>

</body>
</html>

<!-- End of patient-form.html -->
