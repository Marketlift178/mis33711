<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You - CougarCare Medical</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <!-- Top banner section -->
    <div id="banner">
        <img src="logo.png" alt="CougarCare Medical Logo" width="120">
        <h1>CougarCare Medical</h1>
        <p>Patient Registration Form</p>
        <p>Today is: <span id="todayDate"></span></p>

    <!-- Main thank you section -->
    <div class="form-section">
        <h2>Thank You</h2>
        <p>Thank you for your submission.</p>
        <p>Your patient registration form has been received.</p>
    </div>

    <!-- Footer section -->
    <div id="footer">
        <p>CougarCare Medical</p>
        <p>PO Box 18881 | Sugar Land, TX 77496</p>
        <p>
            <a href="mailto:contact@cougarcaremedical.com">Contact Us</a>
        </p>
    </div>

    <!-- Inline JavaScript for dynamic date -->
    <script>
        const today = new Date();
        document.getElementById("todayDate").innerHTML = today.toDateString();
    </script>

</body>
</html>
